<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Configuração enviada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f7;--card:#fff;--line:#e8e4de;--text:#1a1714;--muted:#6b6560;--accent:#2d6a4f;--accent2:#52b788}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(180deg,#faf9f7,#f4f2ef);font-family:'DM Sans',sans-serif;color:var(--text);padding:22px}.card{max-width:620px;background:var(--card);border:1px solid var(--line);border-radius:28px;padding:44px 38px;text-align:center;box-shadow:0 18px 55px rgba(26,23,20,.08)}.icon{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;margin:0 auto 22px;background:rgba(45,106,79,.09);color:var(--accent);font-size:36px}.eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:12px}h1{font-family:'Playfair Display',serif;font-size:38px;line-height:1.1;margin:0 0 14px}p{color:var(--muted);font-size:16px;line-height:1.65;margin:0 auto 24px;max-width:480px}.small{font-size:13px;color:#9b958f}.btn{display:inline-block;background:var(--text);color:#fff;text-decoration:none;border-radius:13px;padding:14px 22px;font-weight:700;margin-top:10px}.btn:hover{background:var(--accent)}
</style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>
    <div class="eyebrow">Configuração enviada</div>
    <h1>Recebemos suas respostas.</h1>
    <p>Obrigada! Nossa equipe vai revisar as informações e seguir com a configuração do seu assistente virtual.</p>
    <div class="small">Você já pode fechar esta página.</div>
    <a class="btn" href="./">Voltar ao formulário</a>
  </main>
</body>
</html>
